<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input,select
        {
            height: 50px;
            margin: 5px;
            width: 20%;
            background-color: #111;
            color: white;
            display: inline;
            font-size: x-large;
        }
        body div:nth-child(2){text-align: left;}
        #Equation{
            width: 90%;
            background:black;
            color:white;
            text-align:right;
            font-size: xx-large;
            padding: 20px;
        }
        
    </style>
</head>
<body style="background-color: black;color:white;">

    <div style="max-width:500px;margin:auto;border:2px solid rgb(62, 60, 60);padding:10px;text-align:center;">
        <textarea id="Equation" rows="5" readonly contenteditable ></textarea><br>

        <select onchange="if(this.value!='Function'){add_text(this.value);this.value='Function'}">
            <option value="Function">Fun()</option>
            <option value="pow(">pow(a,b)</option>
            <option value="factorial(">factorial(n)</option>
            <option value="per(">per(n,r=0)</option>
            <option value="comb(">comb(n,r=0)</option>
            <option value="mod(">mod(a,m)</option>
            <option value="modinv(">modinv(a,m)</option>
            <option value="pi()">pi()</option>
            <option value="e(">e(pow=1)</option>
            <option value="sin(">sin(deg)</option>
            <option value="cos(">cos(deg)</option>
            <option value="tan(">tan(deg)</option>
            <option value="asin(">asin(deg)</option>
            <option value="acos(">acos(deg)</option>
            <option value="atan(">atan(deg)</option>
            
        </select>
        <input type="button" value="%" onclick="add_text(this.value)">
        <input type="button" value="AC" onclick="clear_text()">
        <input type="button" onclick="backspaceAtCursor('Equation')" value="C">
        

        <div id="numbers">
            <input type="button" value="^" onclick="add_text(this.value)">
            <input type="button" value="(" onclick="add_text(this.value)">
            <input type="button" value=")" onclick="add_text(this.value)">
            <input type="button" value="/" onclick="add_text(this.value)"><br>
            <input type="button" value="7" onclick="add_text(this.value)">
            <input type="button" value="8" onclick="add_text(this.value)">
            <input type="button" value="9" onclick="add_text(this.value)">
            <input type="button" value="*" onclick="add_text(this.value)"><br>
            <input type="button" value="4" onclick="add_text(this.value)">
            <input type="button" value="5" onclick="add_text(this.value)">
            <input type="button" value="6" onclick="add_text(this.value)">
            <input type="button" value="-" onclick="add_text(this.value)"><br>
            <input type="button" value="1" onclick="add_text(this.value)">
            <input type="button" value="2" onclick="add_text(this.value)">
            <input type="button" value="3" onclick="add_text(this.value)">
            <input type="button" value="+" onclick="add_text(this.value)"><br>
            <input type="button" value="," onclick="add_text(this.value)">
            <input type="button" value="0" onclick="add_text(this.value)">
            <input type="button" value="." onclick="add_text(this.value)">
            <input type="button" value="=" onclick="answer_display()">
        </div>
        
        
            
        


    </div>



    <script src="../js/calculator.js"></script>
</body>
</html>
